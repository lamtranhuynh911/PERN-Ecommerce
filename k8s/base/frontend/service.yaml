apiVersion: v1
kind: Service
metadata:
  name: frontend-svc # Tên này sẽ thành DNS nội bộ: frontend-svc.default.svc.cluster.local
  labels:
    app.kubernetes.io/name: ecommerce-frontend
    app.kubernetes.io/component: frontend
spec:
  type: ClusterIP # Chỉ cho phép truy cập nội bộ (An toàn hơn LoadBalancer)
  selector:
    # --- CẦU NỐI ---
    # Phải KHỚP HOÀN TOÀN với labels của Pod trong Deployment ở trên
    app.kubernetes.io/name: ecommerce-frontend
    app.kubernetes.io/component: frontend
  ports:
    - name: http
      port: 80         # Port của Service (Bên ngoài truy cập vào port này)
      targetPort: 8080 # Port của Container (Nginx mở port này)
      protocol: TCP