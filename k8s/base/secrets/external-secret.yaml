apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: supabase-es
spec:
  refreshInterval: 24h
  secretStoreRef:
    name: gcp-secret-store
    kind: ClusterSecretStore
  target:
    name: supabase-credentials 
    creationPolicy: Owner
  dataFrom: 
  - extract:
      key: PERN-backend-secret 