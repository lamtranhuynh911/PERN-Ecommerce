apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: supabase-es
spec:
  refreshInterval: 24h
  secretStoreRef:
    name: gcp-secret-store
    kind: ClusterSecretStore
  target:
    name: supabase-credentials # <--- Tên Secret sẽ được tạo ra trong K8s (Dùng trong Deployment)
    creationPolicy: Owner
  dataFrom: # <--- Dùng dataFrom thay vì data để bung file JSON
  - extract:
      key: PERN-backend-secret # Tên Secret trên Google Cloud (chứa JSON)