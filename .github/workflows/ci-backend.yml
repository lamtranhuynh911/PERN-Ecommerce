name: Backend CI - Quality & Testing

on:
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'server/**'
      - 'supabase/**'
      - '.github/workflows/ci-backend.yml'
  push:
    branches: [ main ]
    paths:
      - 'server/**'
      - 'supabase/**'
      - '.github/workflows/ci-backend.yml'

jobs:
  # ---------------------------------------------
  # JOB 1: CHECK QUALITY FIRST (FAIL FAST)
  # ---------------------------------------------
  lint-backend:
    name: Backend Lint & Format
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./server
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: './server/package-lock.json'

      - name: Install Dependencies
        run: npm ci

      - name: Enforce Code Formatting (Prettier)
        run: npm run format:check

      - name: Run Static Code Analysis (ESLint)
        run: npm run lint

  # ---------------------------------------------
  # JOB 2: RUN UNIT TESTS (RUNS ONLY IF JOB 1 PASSES)
  # ---------------------------------------------
  test-backend:
    name: Backend Unit Tests
    runs-on: ubuntu-latest
    # DEV-TIP: Ensures tests only run if linting is successful
    needs: [lint-backend] 
    defaults:
      run:
        working-directory: ./server 

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: './server/package-lock.json'
          
      - name: Install Dependencies
        run: npm ci
      
      - name: Run Supabase Migrations
        run: |
          echo "Starting Database Migrations..."
          for f in ../supabase/migrations/*.sql; do
            echo "Applying: $f"
            psql -h localhost -U testuser -d testdb -f "$f"
          done
        env:
          PGPASSWORD: testpassword

      - name: Run Unit Tests
        run: npm run test:run
        env:
          TEST_DB_URL: postgresql://testuser:testpassword@localhost:5432/testdb
          SECRET: my_super_secret_test_key
          REFRESH_SECRET: refreshsecret_jwt_refresh_secret
