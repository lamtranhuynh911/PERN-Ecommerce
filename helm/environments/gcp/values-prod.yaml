# GCP Production Environment Values
# Override root values for prod environment on GCP

global:
  domain: "ecommerce.example.com"
  environment: "prod"
  cloudProvider: "gcp"

namespace: "pern-prod"

backend:
  replicaCount: 3
  resources:
    requests:
      cpu: "250m"
      memory: "512Mi"
    limits:
      cpu: "1000m"
      memory: "1Gi"
  image:
    tag: "v1.0.0"  # Use specific version in production

frontend:
  replicaCount: 3
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
  image:
    tag: "v1.0.0"  # Use specific version in production

gcp:
  projectId: "your-prod-project-id"
  projectNumber: "000000000000"
  cluster:
    name: "pern-gke-prod"
    location: "asia-southeast1"
    clusterLocation: "asia-southeast1"

config:
  googleClientId: "YOUR_PROD_GOOGLE_CLIENT_ID"
  stripePubKey: "pk_live_prod_key"
  paystackPubKey: "pk_live_prod_key"
  apiBaseUrl: "https://api.ecommerce.example.com"

secrets:
  refreshInterval: "30m"
  externalSecrets:
    secrets:
      - name: "database-connection-string"
        key: "prod-db-connection-string"
      - name: "jwt-secret"
        key: "prod-jwt-secret"
      - name: "encryption-key"
        key: "prod-encryption-key"

ingress:
  tls:
    enabled: true
    certificateName: "pern-ssl-cert-prod"
