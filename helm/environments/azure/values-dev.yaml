# Các giá trị của riêng Azure (Nằm ngoài cùng)
global:
  domain: "ecommerce.thltunneling.dpdns.org"
  environment: "dev"
  cloudProvider: "azure"

namespace: "pernecommerce-dev"

azure:
  projectPrefix: "pernecommerce"
  keyVault:
    name: "pernecommercekvdev"
  # ... (giữ nguyên cấu hình azure cũ của bạn ở đây) ...

secrets:
  externalSecrets:
    enabled: true
    secretStore:
      name: "azure-secret-store"
      kind: "SecretStore"
    secrets:
      # --- Database Secrets ---
      - name: "host"
        key: "supabase-db-host"
      - name: "port"
        key: "supabase-db-port"
      - name: "dbname"
        key: "supabase-db-name"
      - name: "user"
        key: "supabase-db-user"
      - name: "password"
        key: "supabase-db-password"
      
      # --- Email/SMTP Secrets ---
      - name: "smtp-from"
        key: "smtp-from"
      - name: "smtp-user"
        key: "smtp-user"
        
      # --- Payment Secrets ---
      - name: "stripe-secret-key"
        key: "stripe-secret-key"
        
      # --- OAuth & Google Secrets ---
      # (Có vẻ code đang dùng 2 bộ biến cho Google OAuth, ta cứ kéo đủ về)
      - name: "oauth-client-id"
        key: "oauth-client-id"
      - name: "oauth-client-secret"
        key: "oauth-client-secret"
      - name: "oauth-refresh-token"
        key: "oauth-refresh-token"
      - name: "client-id"
        key: "client-id"
      - name: "client-secret"
        key: "client-secret"
      - name: "refresh-token"
        key: "refresh-token"
        
      # --- JWT Secrets ---
      - name: "jwt-secret"
        key: "jwt-secret"
      - name: "jwt-refresh-secret"
        key: "jwt-refresh-secret"

# ========================================================
# CẤU HÌNH TRUYỀN XUỐNG CHART CON (LÕI)
# Bắt buộc phải nằm dưới key 'pern-ecommerce-app'
# ========================================================
pern-ecommerce-app:
  backend:
    replicaCount: 1
    # Bổ sung healthCheck để file deployment không bị lỗi nil pointer
    healthCheck:
      requestPath: "/health"
    resources:
      requests:
        cpu: "100m"
        memory: "256Mi"
      limits:
        cpu: "300m"
        memory: "512Mi"
    image:
      repository: "pernecommerceacrdevregistry.azurecr.io/pern-ecommerce-server"
      pullPolicy: IfNotPresent
      tag: "latest"

  frontend:
    replicaCount: 1
    resources:
      requests:
        cpu: "50m"
        memory: "128Mi"
      limits:
        cpu: "150m"
        memory: "256Mi"
    image:
      repository: "pernecommerceacrdevregistry.azurecr.io/pern-ecommerce-client"
      pullPolicy: IfNotPresent
      tag: "latest"

  config:
    googleClientId: "926599606710-feabn75ggmr1ofggru6mdiupq1vtl4qr.apps.googleusercontent.com"
    stripePubKey: "pk_test_51SnfZ7Ho4mzcNxtWRuqKSjP7gya7ZeV646uV5KxEY1riC9CRtIYFa0ulQ2NzqSigdWwd27QFLEtis1ymc8sJyhfJ00utRylTB6"
    paystackPubKey: "pk_test_uuiduw984x4h4xx41489j94n"
    apiBaseUrl: "https://api.ecommerce.thltunneling.dpdns.org"

  secrets:
    k8sSecretName: "app-secrets"
    refreshInterval: "1h"
    externalSecrets:
      enabled: true
      secretStore:
        name: "azure-secret-store"
        kind: "SecretStore"
      secrets:
        - name: "host"
          key: "supabase-db-host"
        - name: "port"
          key: "supabase-db-port"
        - name: "dbname"
          key: "supabase-db-name"
        - name: "user"
          key: "supabase-db-user"
        - name: "password"
          key: "supabase-db-password"
        - name: "smtp-from"
          key: "smtp-from"
        - name: "smtp-user"
          key: "smtp-user"
        - name: "stripe-secret-key"
          key: "stripe-secret-key"
        - name: "oauth-client-id"
          key: "oauth-client-id"
        - name: "oauth-client-secret"
          key: "oauth-client-secret"
        - name: "oauth-refresh-token"
          key: "oauth-refresh-token"
        - name: "client-id"
          key: "client-id"
        - name: "client-secret"
          key: "client-secret"
        - name: "refresh-token"
          key: "refresh-token"
        - name: "jwt-secret"
          key: "jwt-secret"
        - name: "jwt-refresh-secret"
          key: "jwt-refresh-secret"