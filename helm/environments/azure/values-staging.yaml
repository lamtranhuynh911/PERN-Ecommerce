# Azure Staging Environment Values

global:
  domain: "staging-ecommerce.thltunneling.dpdns.org"
  environment: "staging"
  cloudProvider: "azure"

namespace: "pernecommerce-staging"

backend:
  replicaCount: 2
  resources:
    requests:
      cpu: "150m"
      memory: "384Mi"
    limits:
      cpu: "600m"
      memory: "768Mi"
  image:
    repository: "pernecommerceacrstaging.azurecr.io/pern-ecommerce-server"
    pullPolicy: IfNotPresent
    tag: "staging-latest"

frontend:
  replicaCount: 2
  resources:
    requests:
      cpu: "75m"
      memory: "192Mi"
    limits:
      cpu: "300m"
      memory: "384Mi"
  image:
    repository: "pernecommerceacrstaging.azurecr.io/pern-ecommerce-client"
    pullPolicy: IfNotPresent
    tag: "staging-latest"

azure:
  projectPrefix: "pernecommerce"
  environment: "staging"
  location: "southeastasia"
  resourceGroup: "pernecommerce-rg" 
  cluster:
    name: "pernecommerce-aks-staging" 
    dnsPrefix: "pernecommerce-k8s"
    location: "southeastasia"
    resourceGroup: "pernecommerce-rg"
  acr:
    loginServer: "pernecommerceacrstaging.azurecr.io" 
  keyVault:
    name: "pernecommerce-kv-staging" 
    resourceGroup: "pernecommerce-rg"
    location: "southeastasia"
  managedIdentity:
    name: "pernecommerce-identity-staging"
    resourceGroup: "pernecommerce-rg"

config:
  logLevel: "info"
