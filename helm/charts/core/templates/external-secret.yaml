{{- if and .Values.secrets .Values.secrets.externalSecrets .Values.secrets.externalSecrets.enabled }}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: app-secrets-external
  namespace: {{ .Values.namespace | default "default" }}
  labels:
    app.kubernetes.io/name: pern-ecommerce
    app.kubernetes.io/component: secrets
    app.kubernetes.io/part-of: pern-shop
spec:
  refreshInterval: {{ .Values.secrets.refreshInterval | default "1h" }}
  secretStoreRef:
    name: {{ .Values.secrets.externalSecrets.secretStore.name }}
    kind: {{ .Values.secrets.externalSecrets.secretStore.kind }}
  
  target:
    name: {{ .Values.secrets.k8sSecretName | default "app-secrets" }}
    creationPolicy: Owner
  
  data:
    {{- range .Values.secrets.externalSecrets.secrets }}
    - secretKey: {{ .name }}
      remoteRef:
        key: {{ .key }}
    {{- end }}
{{- end }}