# Azure-specific Helm Values for PERN E-commerce Platform

# Core chart dependency
core:
  enabled: true

# Global settings (inherited from parent)
global:
  cloudProvider: "azure"
  domain: "ecommerce.thltunneling.dpdns.org"
  environment: "prod" 

# Azure-specific configuration
azure:
  projectPrefix: "pernecommerce"
  location: "southeastasia"
  resourceGroup: "pernecommerce-rg"
  
  cluster:
    name: "pernecommerce-aks"
    dnsPrefix: "pernecommerce-k8s"
    location: "southeastasia"
    resourceGroup: "pernecommerce-rg"
  
  acr:
    loginServer: "pernecommerceacr.azurecr.io"
    resourceGroup: "pernecommerce-rg"
  
  keyVault:
    name: "pernecommercekvdev"
    resourceGroup: "pernecommerce-rg"
    location: "southeastasia"
  
  managedIdentity:
    name: "pernecommerce-identity"
    resourceGroup: "pernecommerce-rg"
    clientId: "" 
    tenantId: "" 
    subscriptionId: "" 
  
  appGateway:
    enabled: true
    name: "pernecommerce-agw"
    resourceGroup: "pernecommerce-rg"
  
  publicIP:
    name: "pernecommerce-pip"
    resourceGroup: "pernecommerce-rg"

# ==========================================
# CẤU HÌNH CHO INGRESS
# ==========================================
ingress:
  enabled: true
  className: "nginx"
  annotations:
    appgw.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
  
  hosts:
    - host: "ecommerce.thltunneling.dpdns.org"
      paths:
        - path: "/"
          pathType: Prefix
          backend:
            service:
              name: frontend-svc
              port:
                number: 80
        - path: "/api"
          pathType: Prefix
          backend:
            service:
              name: backend-svc
              port:
                number: 80
  tls:
    enabled: true
    secretName: "pernecommerce-tls-cert"

# ==========================================
# KHỞI TẠO MẶC ĐỊNH CHO EXTERNAL SECRETS
# (Giữ chỗ để tránh lỗi nil pointer)
# ==========================================
secrets:
  externalSecrets:
    enabled: false
    secretStore:
      name: "azure-secret-store"
      kind: "SecretStore"
    secrets: []

# RBAC Configuration
rbac:
  enabled: true

# Health checks
healthChecks:
  enabled: true
  path: "/health"

# Monitoring (Azure Monitor)
monitoring:
  enabled: true
  appInsights:
    instrumentationKey: ""
    enabled: false