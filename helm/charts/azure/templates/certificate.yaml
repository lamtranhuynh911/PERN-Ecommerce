{{- if .Values.ingress.tls.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.ingress.tls.secretName }}
  namespace: {{ .Values.namespace | default "default" }}
  labels:
    app.kubernetes.io/name: pern-ecommerce
    app.kubernetes.io/component: certificate
    app.kubernetes.io/part-of: pern-shop
type: kubernetes.io/tls
data:
  tls.crt: ""  # Base64-encoded self-signed certificate (replace with real cert)
  tls.key: ""  # Base64-encoded private key (replace with real key)
---
# Note: For production, use cert-manager with Let's Encrypt
# This is a placeholder certificate resource
{{- if .Values.ingress.annotations }}
# The annotations in the Ingress will trigger cert-manager to provision ACME certificates
# Configure the ClusterIssuer separately
{{- end }}
{{- end }}