apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: gcp-secret-store
spec:
  provider:
    gcpsm:
      # Templated GCP details
      projectID: {{ .Values.gcp.projectId | quote }}
      auth:
        workloadIdentity:
          clusterLocation: {{ .Values.gcp.clusterLocation | quote }}
          clusterName: {{ .Values.gcp.clusterName | quote }}
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets